<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <img src="logo.png" class="logo">

  <input class="search" placeholder="Tìm kiếm">

  <nav class="menu">
    <a href="index.html">Trang chủ</a>
    <a href="#">Giới thiệu ▲</a>
    <a href="#">Kiến thức</a>
    <a href="#">Liên hệ</a>
    <a class="btn" href="register.html">Đăng ký</a>
    <a class="btn active" href="login.html">Đăng nhập</a>
  </nav>
</header>

<main class="main">

  <div class="login-box">
    <h2>Đăng nhập</h2>

    <div class="input">
      <span>👤</span>
      <input placeholder="Tài khoản">
    </div>

    <div class="input">
      <span>🔑</span>
      <input type="password" placeholder="Mật khẩu">
    </div>

    <p class="forgot">Quên mật khẩu</p>

    <p class="register">
      Nếu chưa có tài khoản hãy ấn 
      <a href="register.html">đăng ký</a>
    </p>

    <button class="btn-login">Đăng nhập</button>
  </div>

  <div class="banner">
    <img src="login.png">
  </div>

</main>

</body>
</html>
