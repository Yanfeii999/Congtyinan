<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <img src="Logo.png" class="logo">

  <div class="search-box">
    <input type="text" placeholder="Tìm kiếm">
  </div>

  <nav class="menu">
    <a href="#">Trang chủ</a>
    <a href="#">Giới thiệu ▲</a>
    <a href="#">Kiến thức</a>
    <a href="#">Liên hệ</a>
    <a class="btn">Đăng ký</a>
    <a class="btn active">Đăng nhập</a>
  </nav>
</header>

<!-- MAIN -->
<main class="main">

  <!-- FORM -->
  <div class="login-box">
    <h2>Đăng nhập</h2>

    <div class="input">
      <span>👤</span>
      <input type="text" placeholder="Tài khoản">
    </div>

    <div class="input">
      <span>🔑</span>
      <input type="password" placeholder="Mật khẩu">
    </div>

    <p class="forgot">Quên mật khẩu</p>

    <p class="register">
      Nếu chưa có tài khoản hãy ấn 
      <a href="#">đăng ký</a>
    </p>

    <button class="btn-login">Đăng Nhập</button>
  </div>

  <!-- IMAGE -->
  <div class="banner">
    <img src="login.png">
  </div>

</main>

</body>
</html>
