<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quên mật khẩu</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">
    <img src="logo.png">
  </div>

  <input class="search" placeholder="Tìm kiếm">

  <nav>
    <a>Trang chủ</a>
    <a>Giới thiệu ▲</a>
    <a>Kiến thức</a>
    <a>Liên hệ</a>
    <a class="btn" href="register.html">Đăng ký</a>
    <a class="btn" href="login.html">Đăng nhập</a>
  </nav>
</header>

<div class="container">

  <div class="form-box">
    <h2>Quên mật khẩu</h2>

    <input placeholder="Tài khoản">

    <div class="row">
      <input type="password" placeholder="Mật khẩu">
      <input type="password" placeholder="Xác nhận mật khẩu">
    </div>

    <input placeholder="Email">

    <p class="center">
      Nếu đã có tài khoản hãy ấn 
      <a class="red" href="login.html">đăng nhập</a>
    </p>

    <p class="center">
      Nếu chưa có tài khoản hãy ấn 
      <a class="red" href="register.html">đăng ký</a>
    </p>

    <button>Lấy lại mật khẩu</button>
  </div>

  <div class="image">
    <img src="login.png">
  </div>

</div>

</body>
</html>
