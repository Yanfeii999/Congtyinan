<!-- ===== HERO ===== -->

<!-- ===== SLIDE ===== -->
<div class="slideshow-section">

  <div class="tranh-lt-auto" id="slide"></div>

  <div class="nh-lt">
    <div class="frame">

      <button class="frame-2" id="prev">
        <div class="rectangle-7"></div>
        <div class="text-wrapper-4"><</div>

      <button class="frame-2" id="next">
        <div class="rectangle-7"></div>
        <div class="text-wrapper-4">></div>
      </button>

    </div>
  </div>

</div>

<!-- ===== PRODUCTS ===== -->
<div class="mua-bn">

  <!-- CARD 1 -->
  <div class="poster-mew">
    <img class="rectangle-3" src="images/trangchuauto.png">

    <div class="gi">
      <div class="text-wrapper">Poster Mew</div>
      <div class="div">100.000 VNĐ</div>
    </div>

    <button class="mua-ngay">
      <span class="text-wrapper-2">Mua ngay</span>
    </button>
  </div>

  <!-- CARD 2 -->
  <div class="poster-lugia">
    <img class="rectangle-5" src="images/trangchuauto (2).png">

    <div class="gi-2">
      <div class="text-wrapper">Poster Lugia</div>
      <div class="div">300.000 VNĐ</div>
    </div>

    <button class="div-wrapper">
      <span class="text-wrapper-2">Mua ngay</span>
    </button>
  </div>

  <!-- CARD 3 -->
  <div class="hoa-xanh">
    <img class="rectangle-3" src="images/trangchuauto (3).png">

    <div class="gi-3">
      <div class="text-wrapper">Poster Hoa</div>
      <div class="div">120.000 VNĐ</div>

      <span class="text-wrapper-2">Mua ngay</span>

  </div>

  <!-- CARD 4 -->
  <div class="hoa-trng">
    <img class="rectangle-3" src="images/trangchuauto (4).png">

    <div class="gi-3">
      <div class="text-wrapper">Poster Hoa trắng</div>
      <div class="div">110.000 VNĐ</div>
    </div>

    <button class="mua-ngay">

  </div>

  <!-- CARD 5 -->
  <div class="hoa">
    <img class="rectangle-6" src="images/Rectangle31.png">

    <div class="gi-4">

<!-- ===== FOOTER ===== -->
<div class="footer-banners">
  <img class="img" src="images/trangchuauto.png">
  <img class="rectangle-2" src="images/trangchuauto (2).png">
</div>

</div>

<!-- ===== JS ===== -->
<script>
const slides = [
  "images/trangchuauto.png",
  "images/trangchuauto (2).png",
  "images/trangchuauto (3).png"
];

let i = 0;
const slide = document.getElementById("slide");

function showSlide(){
  slide.style.backgroundImage = "url(" + slides[i] + ")";
}
showSlide();

document.getElementById("next").onclick = () => {
  i = (i + 1) % slides.length;
  showSlide();
};

document.getElementById("prev").onclick = () => {
  i = (i - 1 + slides.length) % slides.length;
  showSlide();
};
</script>

</body>
