<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>LQT Poster</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ===== NAV ===== -->
<div class="nav">

  <img src="logo.png" class="logo">

  <input type="text" placeholder="Tìm kiếm" class="search">

  <div class="menu">
    <a href="index.html">Trang chủ</a>
    <a href="gioithieu.html">Giới thiệu ▲</a>
    <a href="kienthuc.html">Kiến thức</a>
    <a href="lienhe.html">Liên hệ</a>
    <a href="register.html">Đăng ký</a>
    <a href="login.html">Đăng nhập</a>
  </div>

</div>

<!-- ===== BANNER ===== -->
<img src="trangchuentren.png" class="banner">

<!-- ===== SLIDE ===== -->
<div class="slide" id="slide"></div>

<div class="btns">
  <button onclick="prev()"> < </button>
  <button onclick="next()"> > </button>
</div>

<!-- ===== PRODUCTS ===== -->
<div class="products">

  <div class="card">
    <img src="Trangchuauto.png">
    <p>100.000 VNĐ</p>
  </div>

  <div class="card">
    <img src="trangchuauto (2).png">
    <p>300.000 VNĐ</p>
  </div>

  <div class="card">
    <img src="trangchuauto (3).png">
    <p>120.000 VNĐ</p>
  </div>

  <div class="card">
    <img src="trangchuauto (4).png">
    <p>110.000 VNĐ</p>
  </div>

  <div class="card">
    <img src="Rectangle 31.png">
    <p>120.000 VNĐ</p>
  </div>

</div>

<script>
let slides = [
  "Trangchuauto.png",
  "trangchuauto (2).png",
  "trangchuauto (3).png"
];

let i = 0;
let slide = document.getElementById("slide");

function show(){
  slide.style.backgroundImage = "url(" + slides[i] + ")";
}
show();

function next(){
  i = (i+1)%slides.length;
  show();
}

function prev(){
  i = (i-1+slides.length)%slides.length;
  show();
}
</script>

</body>
</html>
